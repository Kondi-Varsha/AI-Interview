<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Interview</title>
  </head>
  <body>
    <h2>AI Interview</h2>
    <p>Click the button below to start your interview.</p>
    <p>Please allow microphone access when asked.</p>

    <button id="startBtn" style="padding:12px 24px;font-size:16px;cursor:pointer;background:#4CAF50;color:white;border:none;border-radius:8px;">
      Start Interview
    </button>

    <script src="https://unpkg.com/@vapi-ai/web@latest/dist/vapi.js"></script>
    <script>
      document.getElementById('startBtn').addEventListener('click', async () => {
        const vapi = new Vapi("82f5ba29-629f-41e0-841a-7f11c9f37b47");
        await vapi.start("b4dd798d-992b-42c6-b716-cd9df674a9af");
      });
    </script>
  </body>
</html>
